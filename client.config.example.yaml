client:
  id: dev-client-01
  name: Development Machine
  tags:
    - dev

server:
  wsUrl: ws://localhost:3000/ws/client
  apiBaseUrl: http://localhost:3000
  token: test_agent_token

workspace:
  dir: ./workspace
  allowedRoots:
    - ./workspace

frp:
  binPath: ./bin/frpc
  workDir: ./frp

http:
  host: 127.0.0.1
  port: 17890
  job:
    maxConcurrent: 4
    defaultTimeoutMs: 300000
    maxTimeoutMs: 1800000
    logBufferLines: 5000
